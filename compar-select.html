<!DOCTYPE html>
<html lang="en">
<head>
  <title>Select Stories – Continuum</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="frame-layout">

  <!-- NAVIGATION -->
  <div class="top-frame">
    <a href="home.html" class="logo">
      <img src="assets/continuum_logo_w.png">
      <span>Continuum</span>
    </a>

    <nav class="nav-center">
      <a href="explore.html">Explore</a>
      <a href="write.html">Write</a>
      <a href="compare.html">Compare</a>
      <a href="stories.html">My Stories</a>
    </nav>

    <div class="nav-right">
      <a href="profile.html">Profile</a>
    </div>
  </div>

  <!-- CONTENT -->
  <div class="bottom-frame">
    <div class="container">

      <div class="compare-header">
        <h2>Select Stories to Compare</h2>
        <p class="soft-text">
          These stories share similar themes or tags.  
          Choose the ones you want to read together.
        </p>
      </div>

      <div class="compare-select-list">

        <label class="compare-select-item">
          <input type="checkbox">
          <div>
            <h4>Pongal Morning</h4>
            <p class="soft-text">Tamil Nadu · Food · Family</p>
          </div>
        </label>

        <label class="compare-select-item">
          <input type="checkbox">
          <div>
            <h4>Baisakhi Fields</h4>
            <p class="soft-text">Punjab · Harvest · Community</p>
          </div>
        </label>

        <label class="compare-select-item">
          <input type="checkbox">
          <div>
            <h4>Onam Feast</h4>
            <p class="soft-text">Kerala · Food · Tradition</p>
          </div>
        </label>

        <label class="compare-select-item">
          <input type="checkbox">
          <div>
            <h4>Bihu Dance</h4>
            <p class="soft-text">Assam · Festival · Memory</p>
          </div>
        </label>

      </div>

      <br>
      <button onclick="goToCompareView()">
        Compare Selected Stories
      </button>

    </div>
  </div>

</div>

<script>
function goToCompareView() {
  // In a real app, selected IDs would be passed
  window.location.href = "compare-view.html";
}
</script>

</body>
</html>
